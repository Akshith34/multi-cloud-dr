name: DR Failover Tests

on:
  # Weekly scheduled DR drill — every Sunday at 2am UTC
  schedule:
    - cron: "0 2 * * 0"

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      mode:
        description: "DR mode to test"
        required: true
        default: "active-passive"
        type: choice
        options:
          - active-passive
          - active-active
          - validate-only
      target_region:
        description: "Target DR region"
        required: true
        default: "us-west-2"
      dry_run:
        description: "Dry run only (no actual failover)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  # Run on PR to validate changes
  pull_request:
    paths:
      - "terraform/**"
      - "lambda/**"
      - "fis/**"

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: "1.6.6"
  PYTHON_VERSION: "3.11"

jobs:
  ###############################################
  # Terraform Validation
  ###############################################
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - terraform/aws
          - terraform/azure
          - terraform/gcp
          - terraform/modules/aurora-global
          - terraform/modules/route53-failover
          - terraform/modules/s3-replication

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check -recursive

  ###############################################
  # Lambda Unit Tests
  ###############################################
  lambda-tests:
    name: Lambda Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install boto3 pytest pytest-mock moto[rds,route53,s3,lambda] coverage

      - name: Run Lambda tests
        run: |
          cd lambda
          python -m pytest tests/ -v --tb=short \
            --cov=dr-orchestrator \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: lambda/coverage.xml

  ###############################################
  # FIS Template Validation
  ###############################################
  fis-validate:
    name: FIS Experiment Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate FIS JSON templates
        run: |
          for f in fis/experiments/*.json; do
            echo "Validating: $f"
            python3 -c "import json; json.load(open('$f'))" && echo "  ✅ Valid JSON" || (echo "  ❌ Invalid JSON" && exit 1)
          done

      - name: Check required FIS fields
        run: |
          python3 scripts/validate-fis-templates.py

  ###############################################
  # Replication Health Check (non-destructive)
  ###############################################
  replication-health:
    name: Replication Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    environment: production-read-only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DR_READONLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Aurora replication lag
        run: |
          bash scripts/validate-replication.sh --verbose

      - name: Check S3 replication metrics
        run: |
          aws cloudwatch get-metric-statistics \
            --namespace AWS/S3 \
            --metric-name ReplicationLatency \
            --start-time $(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --period 3600 \
            --statistics Maximum \
            --region ${{ env.AWS_REGION }}

  ###############################################
  # Automated DR Drill (scheduled only)
  ###############################################
  dr-drill:
    name: Automated DR Drill
    runs-on: ubuntu-latest
    needs: [terraform-validate, lambda-tests, replication-health]
    if: github.event_name == 'schedule'
    environment: dr-testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DR_EXECUTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run DR drill (dry run — scheduled)
        run: |
          chmod +x scripts/dr-drill.sh
          ./scripts/dr-drill.sh \
            --mode active-passive \
            --target us-west-2 \
            --dry-run \
            --notify-slack

      - name: Upload drill results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dr-drill-results-${{ github.run_id }}
          path: /tmp/dr-drill-*.log
          retention-days: 90

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ *Scheduled DR Drill FAILED*\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\nBranch: ${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DR_WEBHOOK_URL }}

  ###############################################
  # Manual DR Drill (workflow_dispatch only)
  ###############################################
  manual-dr-drill:
    name: Manual DR Drill
    runs-on: ubuntu-latest
    needs: [terraform-validate, lambda-tests]
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.dry_run == 'true' && 'dr-testing' || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DR_EXECUTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run manual DR drill
        run: |
          chmod +x scripts/dr-drill.sh
          ./scripts/dr-drill.sh \
            --mode "${{ inputs.mode }}" \
            --target "${{ inputs.target_region }}" \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }} \
            --notify-slack

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-drill-${{ github.run_id }}
          path: /tmp/dr-drill-*.log
          retention-days: 90
