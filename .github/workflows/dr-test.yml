name: DR Failover Tests

on:
  push:
    branches:
      - main

jobs:
  validate-fis-templates:
    name: ✅ Validate FIS Experiment Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON templates
        run: |
          for f in fis/experiments/*.json; do
            echo "Validating: $f"
            python3 -c "import json; json.load(open('$f'))" && echo "✅ $f is valid JSON"
          done

  validate-lambda:
    name: ✅ Validate Lambda Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python syntax
        run: |
          python3 -m py_compile lambda/dr-orchestrator/handler.py
          echo "✅ Lambda handler syntax valid"

  validate-scripts:
    name: ✅ Validate Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check scripts exist and are executable
        run: |
          test -f scripts/dr-drill.sh && echo "✅ dr-drill.sh exists"
          test -f scripts/validate-replication.sh && echo "✅ validate-replication.sh exists"
          bash -n scripts/dr-drill.sh && echo "✅ dr-drill.sh syntax valid"
          bash -n scripts/validate-replication.sh && echo "✅ validate-replication.sh syntax valid"

  validate-runbooks:
    name: ✅ Validate Runbooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all required files exist
        run: |
          test -f runbooks/02-active-passive-failover.md && echo "✅ Runbook exists"
          test -f README.md && echo "✅ README exists"
          test -f terraform/modules/aurora-global/main.tf && echo "✅ Aurora Terraform exists"
          test -f terraform/modules/route53-failover/main.tf && echo "✅ Route53 Terraform exists"
          test -f terraform/modules/s3-replication/main.tf && echo "✅ S3 Terraform exists"
          echo "✅ All required files present"