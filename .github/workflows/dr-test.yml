name: DR Failover Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-terraform:
    name: Validate Terraform Modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform Format Check
        run: |
          terraform fmt -check -recursive terraform/
          echo "✅ Terraform formatting valid"

  validate-fis-templates:
    name: Validate FIS Experiment Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON templates
        run: |
          for f in fis/experiments/*.json; do
            echo "Validating: $f"
            python3 -c "import json; json.load(open('$f'))" && echo "✅ $f is valid JSON"
          done

  validate-lambda:
    name: Validate Lambda Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python syntax
        run: |
          python3 -m py_compile lambda/dr-orchestrator/handler.py
          echo "✅ Lambda handler syntax valid"

  validate-runbooks:
    name: Validate Runbooks Exist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check runbooks are present
        run: |
          test -f runbooks/02-active-passive-failover.md && echo "✅ Runbook exists"
          test -f scripts/dr-drill.sh && echo "✅ DR drill script exists"
          test -f scripts/validate-replication.sh && echo "✅ Replication check script exists"
          echo "✅ All required files present"